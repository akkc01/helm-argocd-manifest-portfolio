apiVersion: apps/v1
kind: Deployment
metadata:
  name: akkc-deployment
  labels:
    app: akkc-portfolio-deployment

spec:
  replicas: {{ .Values.replicaCount }}

  selector:
    matchLabels:
      app: {{ .Values.labels.app }}

  template:
    metadata:
      labels:
        app: {{ .Values.labels.app }}

    spec:
      containers:
      - name: nginx
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}

        ports:
        - containerPort: 80

        resources:
          {{ toYaml .Values.resources | indent 10 }}


